services:
  nginx:
    image: nginx:1.21.1
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./laravel:/var/www/
    depends_on:
      - php


  php:
    build: ./docker/php
    volumes:
      - ./laravel:/var/www/
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/php.ini

  next:
    image: node:20
    tty: true # コンテナを落とさないため
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    ports:
      - "3000:3000" # Next.jsは3000番で開く
    command: sh -c "npm install && npm run dev"
    environment:
      - WATCHPACK_POLLING=true


  mysql:
    image: mysql:8.0.26
    platform: linux/amd64
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: laravel_db
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: laravel_pass
    command:
      - mysqld
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot"]
      # ↑ 「mysqlに接続できるか試してみて」という確認コマンド
      interval: 5s    # 5秒ごとに確認する
      timeout: 5s     # 5秒以内に返事がなければ失敗とみなす
      retries: 10     # 10回試してダメなら諦める

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    platform: linux/amd64
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=mysql
      - PMA_USER=laravel_user
      - PMA_PASSWORD=laravel_pass
    depends_on:
      - mysql
    ports:
      - 8888:80
  
  reverb:
    build: ./docker/php
    volumes:
      - ./laravel:/var/www/
    working_dir: /var/www
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy  # ← 「MySQLのhealthcheckがOKになるまで待って」
      php:
        condition: service_started  # ← 「phpコンテナが起動したら動いて」
  
  